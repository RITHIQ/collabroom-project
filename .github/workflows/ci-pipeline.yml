          sudo mv k6-v0.50.0-linux-amd64/k6 /usr/local/bin/
          k6 version

      - name: Run smoke test
        run: k6 run --out json=mobile-load-results.json load-tests/mobile/smoke-test.js

      - name: Run load test
        run: k6 run load-tests/mobile/load-test.js

      - name: Run stress test
        run: k6 run load-tests/mobile/stress-test.js

      - name: Run spike test
        run: k6 run load-tests/mobile/spike-test.js

      - name: Run soak test
        run: k6 run load-tests/mobile/soak-test.js

      - name: Run auth scenarios
        run: k6 run load-tests/mobile/scenarios/auth.js

      - name: Run sync scenarios
        run: k6 run load-tests/mobile/scenarios/sync.js

      - name: Run notification scenarios
        run: k6 run load-tests/mobile/scenarios/notifications.js

      - name: Upload mobile load results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-mobile-load-results
          path: mobile-load-results.json

  security-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd security-tests
          pip install -r requirements.txt

      - name: Run Web Security Tests
        run: |
          cd security-tests
          pytest web/ -s

      - name: Upload Web Security Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-web-report-xlsx
          path: collabroom-tests/reports/security-web-report.xlsx
          retention-days: 30

      - name: Upload Web Security CSV Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-web-report-csv
          path: collabroom-tests/reports/security-web-report.csv
          retention-days: 30

      - name: Print Web CSV summary to workflow log
        if: always()
        run: |
          echo "========== WEB SECURITY TEST RESULTS =========="
          if [ -f collabroom-tests/reports/security-web-report.csv ]; then
            cat collabroom-tests/reports/security-web-report.csv
          else
            echo "CSV report not found."
          fi
          echo "==============================================="

