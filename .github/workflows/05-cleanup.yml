name: "Wipe Old History"
run-name: "Wiping all old workflow history..."

on:
  push:
    branches: [ "main" ]

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log("Fetching all workflow runs...");
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 100
            });
            
            console.log(`Found ${runs.length} total runs.`);
            
            // Get the current time and subtract 30 minutes
            const cutoffTime = new Date(Date.now() - 30 * 60 * 1000);
            
            let deletedCount = 0;
            
            for (const run of runs) {
              const runDate = new Date(run.created_at);
              // Delete if older than 30 minutes
              if (runDate < cutoffTime) {
                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id
                  });
                  deletedCount++;
                  console.log(`Deleted old run: ${run.name} (ID: ${run.id})`);
                } catch (error) {
                  console.log(`Failed to delete run ${run.id}: ${error.message}`);
                }
              }
            }
            
            console.log(`Successfully deleted ${deletedCount} old runs! Your history is now clean.`);
