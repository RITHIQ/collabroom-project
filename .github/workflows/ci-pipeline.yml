name: "CollabRoom CI Pipeline"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  selenium-web-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | \
            sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -y
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Install dependencies (root & web)
        run: |
          npm install
          npm run setup

      - name: Install dependencies (selenium)
        run: npm ci
        working-directory: collabroom-tests/selenium

      - name: Run Selenium tests (headless)
        env:
          BASE_URL: ${{ vars.SELENIUM_BASE_URL || 'http://localhost:8081' }}
          HEADLESS: "true"
          CREATOR_EMAIL: "collabroomoperations+creator@gmail.com"
          CREATOR_PASSWORD: "Project2027#"
          BRAND_EMAIL: "collabroomoperations+brand@gmail.com"
          BRAND_PASSWORD: "Project2027#"
        run: npx jest --forceExit --verbose 2>&1
        working-directory: collabroom-tests/selenium

      - name: Upload Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report-xlsx
          path: collabroom-tests/reports/selenium-report.xlsx
          retention-days: 30

      - name: Upload CSV report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report-csv
          path: collabroom-tests/reports/selenium-report.csv
          retention-days: 30

      - name: Print CSV summary to workflow log
        if: always()
        run: |
          echo "========== SELENIUM TEST RESULTS =========="
          if [ -f collabroom-tests/reports/selenium-report.csv ]; then
            cat collabroom-tests/reports/selenium-report.csv
          else
            echo "CSV report not found — tests may have failed to run."
          fi
          echo "==========================================="

  k6-web-load:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install json-server
        run: npm install -g json-server@0.17.4

      - name: Start mock server on port 3001
        run: |
          nohup json-server --watch load-tests/mock-server/db.json --port 3001 &
          sleep 5
          curl -s http://localhost:3001/users | head -c 100

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.50.0/k6-v0.50.0-linux-amd64.tar.gz -L | tar xvz
          sudo mv k6-v0.50.0-linux-amd64/k6 /usr/local/bin/
          k6 version

      - name: Run smoke test
        run: k6 run --out json=web-load-results.json load-tests/web/smoke-test.js

      - name: Run load test
        run: k6 run load-tests/web/load-test.js

      - name: Run stress test
        run: k6 run load-tests/web/stress-test.js

      - name: Run spike test
        run: k6 run load-tests/web/spike-test.js

      - name: Run soak test
        run: k6 run load-tests/web/soak-test.js

      - name: Run auth scenarios
        run: k6 run load-tests/web/scenarios/auth.js

      - name: Run campaigns scenarios
        run: k6 run load-tests/web/scenarios/campaigns.js

      - name: Run contracts scenarios
        run: k6 run load-tests/web/scenarios/contracts.js

      - name: Upload web load results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-web-load-results
          path: web-load-results.json

  k6-mobile-load:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
