# .github/workflows/01-selenium-web-ui-tests.yml
name: "Selenium Web UI Tests - CollabRoom"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  selenium-web-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: selenium-tests

      - name: Run Selenium tests
        run: npx jest --verbose
        working-directory: selenium-tests
        env:
          SELENIUM_HEADLESS: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-ui-results
          path: selenium-tests/selenium-results.xml
