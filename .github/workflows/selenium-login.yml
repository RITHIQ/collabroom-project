name: 🚀 Deploy + Selenium E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: 🏗️ Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build React app
        working-directory: web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_URL: /collabroom/
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          publish_branch: gh-pages
          force_orphan: true

  selenium-e2e:
    name: 🧪 Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: collabroom-tests/selenium/package-lock.json

      - name: Install Chrome browser
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Install Selenium test dependencies
        working-directory: collabroom-tests/selenium
        run: npm ci

      - name: Wait for GitHub Pages deployment to propagate
        run: |
          echo "Waiting 60s for GitHub Pages to propagate..."
          sleep 60
          curl --retry 10 --retry-delay 5 --retry-connrefused -sSf https://rithiq.github.io/collabroom/ > /dev/null && echo "Site is live!" || echo "Site may still be warming up"

      - name: Run Selenium E2E Tests (against deployed site)
        working-directory: collabroom-tests/selenium
        env:
          CI: true
          HEADLESS: true
          BASE_URL: https://rithiq.github.io/collabroom
        run: npm test
        continue-on-error: true

      - name: Generate Excel Report
        working-directory: collabroom-tests/selenium
        if: always()
        run: node generate-excel.js

      - name: Upload E2E test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-e2e-report
          path: |
            collabroom-tests/selenium/jest-results.json
            collabroom-tests/selenium/reports/E2E_Test_Report.xlsx
          retention-days: 30

  selenium-pr:
    name: 🧪 Selenium Tests (PR — localhost)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build React app
        working-directory: web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_URL: /
        run: npm run build

      - name: Start Vite preview server
        working-directory: web
        run: npx vite preview --port 3000 --host &

      - name: Wait for Vite server to start
        run: npx --yes wait-on http://127.0.0.1:3000 --timeout 30000

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Install Selenium dependencies
        working-directory: collabroom-tests/selenium
        run: npm ci

      - name: Run Selenium E2E Tests (PR test - localhost)
        working-directory: collabroom-tests/selenium
        env:
          CI: true
          HEADLESS: true
          BASE_URL: http://127.0.0.1:3000
        run: npm test
        continue-on-error: true

      - name: Generate Excel Report
        working-directory: collabroom-tests/selenium
        if: always()
        run: node generate-excel.js

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-pr-report
          path: |
            collabroom-tests/selenium/jest-results.json
            collabroom-tests/selenium/reports/E2E_Test_Report.xlsx
          retention-days: 7
