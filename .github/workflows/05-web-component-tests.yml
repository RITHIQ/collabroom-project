# .github/workflows/05-web-component-tests.yml
name: "Vitest Web Component Tests - CollabRoom"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  vitest-web-components:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: vitest-web-tests

      - name: Run Vitest component tests
        run: npm test
        working-directory: vitest-web-tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-web-results
          path: vitest-web-tests/
