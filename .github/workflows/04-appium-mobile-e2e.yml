# .github/workflows/04-appium-mobile-e2e.yml
name: "Appium Mobile E2E Tests - CollabRoom"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  appium-mobile-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: appium-tests

      - name: Run Mobile E2E tests
        run: npm test
        working-directory: appium-tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-mobile-results
          path: appium-tests/
