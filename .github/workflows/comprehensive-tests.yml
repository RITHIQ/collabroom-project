name: 🚀 Comprehensive E2E & Security Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  run-web-tests:
    name: 🌐 Web Automation (Selenium)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build Web App
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Install Test Dependencies & Run Web Tests
        working-directory: collabroom-tests/selenium
        env:
          CI: true
          HEADLESS: true
        run: |
          npm ci
          npm test || echo "Tests finished with some failures"

      - name: Upload Web Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-test-results
          path: collabroom-tests/selenium/jest-results.json
          retention-days: 1

  run-mobile-tests:
    name: 📱 Mobile Automation (Appium)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Install Appium
        run: npm install -g appium

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          script: |
            cd collabroom-tests/appium
            npm ci
            npm test || echo "Mobile tests finished"

      - name: Upload Mobile Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-test-results
          path: collabroom-tests/appium/jest-results.json
          retention-days: 1

  run-security-tests:
    name: 🔒 Backend Security (DAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies & Run DAST
        working-directory: collabroom-tests/dast
        run: |
          npm ci
          npm test || echo "DAST finished with some failures"

      - name: Upload DAST Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: collabroom-tests/dast/automated_test/jest-results.json
          retention-days: 1

  generate-reports:
    name: 📊 Generate Excel Reports
    needs: [run-web-tests, run-mobile-tests, run-security-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Report Dependencies
        working-directory: collabroom-tests
        run: npm install

      # Download all JSON results
      - name: Download Web Results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: web-test-results
          path: collabroom-tests/selenium

      - name: Download Mobile Results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: mobile-test-results
          path: collabroom-tests/appium

      - name: Download Security Results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: security-test-results
          path: collabroom-tests/dast/automated_test

      - name: Generate Excel Reports
        working-directory: collabroom-tests
        run: npm run report:excel

      - name: Upload Final Excel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Comprehensive-Excel-Reports
          path: collabroom-tests/reports/*.xlsx
          retention-days: 30
