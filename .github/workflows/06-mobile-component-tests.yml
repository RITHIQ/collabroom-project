name: "📱 Jest Mobile Component Tests — CollabRoom"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  jest-mobile-components:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - run: cd jest-mobile-tests && npm ci
      - run: cd jest-mobile-tests && npm test
      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: jest-mobile-results, path: jest-mobile-tests/ }
