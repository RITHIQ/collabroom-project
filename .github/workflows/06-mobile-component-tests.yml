# .github/workflows/06-mobile-component-tests.yml
name: "Jest Mobile Component Tests - CollabRoom"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  jest-mobile-components:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: jest-mobile-tests

      - name: Run Jest mobile component tests
        run: npm test
        working-directory: jest-mobile-tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-mobile-results
          path: jest-mobile-tests/
