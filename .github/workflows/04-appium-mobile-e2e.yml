name: "Appium Mobile E2E Tests - CollabRoom"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  appium-mobile-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - run: cd appium-tests && npm ci
      - run: cd appium-tests && npm test
      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: appium-mobile-results, path: appium-tests/ }
