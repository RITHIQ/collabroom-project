name: "Load Tests"
run-name: "load test"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  load-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: collabroom-tests/load-tests

      - name: Run Web & Mobile Load Tests
        run: npm test
        working-directory: collabroom-tests/load-tests

      - name: Upload Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-report-xlsx
          path: collabroom-tests/reports/load-report.xlsx
          retention-days: 30

      - name: Upload CSV report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-report-csv
          path: collabroom-tests/reports/load-report.csv
          retention-days: 30

      - name: Print CSV summary to workflow log
        if: always()
        run: |
          echo "========== LOAD TEST RESULTS =========="
          if [ -f collabroom-tests/reports/load-report.csv ]; then
            cat collabroom-tests/reports/load-report.csv
          else
            echo "CSV report not found."
          fi
          echo "======================================="
